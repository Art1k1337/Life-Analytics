workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.lifeanalytics.lifeAnalytics"
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
        - ios/Pods
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: cd ios && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          fetch-signing-files $BUNDLE_ID --type distribution
          keychain add-certificates
      - name: Build iOS
        script: flutter build ios --release --export-options-plist=/Users/builder/export_options.plist
      - name: Package IPA
        script: |
          mkdir -p /tmp/build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app /tmp/build/ios/ipa/Payload/
          cd /tmp/build/ios/ipa
          zip -r /tmp/build/ios/LifeAnalytics.ipa Payload
    artifacts:
      - /tmp/build/ios/LifeAnalytics.ipa
      - build/ios/iphoneos/Runner.app
