workflows:
  ios-release:
    name: iOS Release (AltStore)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Build iOS
        script: flutter build ios --release --no-codesign

      - name: Package IPA for AltStore
        script: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r LifeAnalytics.ipa Payload
          rm -rf Payload
    artifacts:
      - LifeAnalytics.ipa
