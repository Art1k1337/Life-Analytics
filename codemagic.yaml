workflows:
  ios-release:
    name: iOS Release (AltStore)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          # Codemagic автоматически подтянет сертификаты из Integrations → Apple

      - name: Fetch provisioning profiles
        script: |
          # Codemagic автоматически найдёт подходящий provisioning profile
          fetch-identifiers

      - name: Install dependencies
        script: flutter pub get

      - name: Build iOS
        script: flutter build ios --release --no-codesign

      - name: Archive
        script: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath ../build/Runner.xcarchive \
            archive

      - name: Export IPA
        script: |
          cat > build/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ios/output \
            -exportOptionsPlist build/ExportOptions.plist

    artifacts:
      - build/ios/output/*.ipa
