workflows:
  ios-release:
    name: iOS Release (AltStore)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Build iOS
        script: flutter build ios --release --no-codesign

      - name: Create IPA
        script: |
          # Копируем .app через ditto (сохраняет symlinks и metadata)
          mkdir -p Payload
          ditto build/ios/iphoneos/Runner.app Payload/Runner.app

          # Проверяем что Info.plist существует и валиден
          plutil -lint Payload/Runner.app/Info.plist

          # Пакуем IPA с сохранением symlinks
          ditto -ck --sequesterRsrc --keepParent Payload LifeAnalytics.ipa

          # Проверяем структуру IPA
          unzip -l LifeAnalytics.ipa | head -20

          rm -rf Payload

    artifacts:
      - LifeAnalytics.ipa
